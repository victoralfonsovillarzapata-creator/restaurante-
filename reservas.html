<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reservas | Sabores del Campo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">


  <style>
    .reserva-box {
      max-width: 750px;
      margin: auto;
      color: rgb(141, 144, 157);
      font-size: 6mm;
    }
    
    .reserva-box:hover {
      transform: scale(1.01);
      transition: 0.3s ease;
      color: rgb(124, 250, 56);
      border: 5mm;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark"  style="background-color: rgb(61, 228, 24); color: beige;">
    <div class="container">
      <a class="navbar-brand" href="index.html">Sabores del Campo</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link active" href="reservas.html">Reservas</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container mt-5">
    <div class="reserva-box shadow p-4 rounded" style="background-color: rgb(255, 254, 204);">

      <h2 class="text-center mb-3">Reserva tu mesa</h2>
      <p class="text-center text-muted mb-4">
        Completa todo el formulario y te confirmaremos tu reserva.
      </p>

      <form>
        <div class="mb-3">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-control" placeholder="Eje: Pepito Ramirez">
        </div>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="pepito@gmail.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Fecha de la reserva</label>
          <input type="date" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Hora</label>
          <input type="time" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Número de personas</label>
          <select class="form-select">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5+</option>
          </select>
        </div>

        <div class="d-grid">
          <button class="btn btn-success btn-lg">
            Reservar ahora
          </button>
        </div>
      </form>

    </div>
  </div>
</body>
  <footer class=" text-center  mt-5  text-white py-4"  style="background-color: rgb(61, 228, 24); color: beige;">
    <div class="container ">
     <h5>Síguenos en redes sociales</h5>

      <div class="d-flex justify-content-center gap-2">

       <a href="https://facebook.com" class="iconos "><img src="imagenes/facebook.png" alt="facebook"></a>
       <a href="https://www.instagram.com" class="iconos"><img src="imagenes/instagram.png" alt="instagram"></a>
       <a href="https://twitter.com" class="iconos "><img src="imagenes/twitter.png" alt="twitter" class="rounded"></a>

     </div>

    </div>
